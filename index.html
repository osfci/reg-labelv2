<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Badge Label Generator</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root{
      --label-w: 3.5in;
      --label-h: 1.097in;
      --pad: 0.08in;
      --qr: 0.62in;
      --qr-gap: 0.06in;
      --font: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body{
      font-family: var(--font);
      margin: 16px;
      color: #111;
    }

    .app{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }

    .card{
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      background: #fff;
    }

    label{ font-size: 12px; font-weight: 600; }

    input, select{
      width: 100%;
      padding: 9px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 8px;
    }

    button{
      padding: 10px;
      border-radius: 10px;
      font-weight: 700;
      cursor:pointer;
    }

    .primary{ background:#2563eb; color:#fff; }
    .secondary{ background:#f3f4f6; }

    /* LABEL */
    #label{
      width: var(--label-w);
      height: var(--label-h);
      border: 1px dashed #aaa;
      position:relative;
      overflow:hidden;
    }

    #label .textArea{
      position:absolute;
      top: var(--pad);
      left: var(--pad);
      bottom: var(--pad);
      right: calc(var(--pad) + var(--qr) + var(--qr-gap));
      display:flex;
      flex-direction:column;
      gap: 0.05in;
    }

    .topline{
      display:flex;
      justify-content: space-between;
    }

    #badgeNameOut{
      font-size: 18pt;
      font-weight: 800;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    #badgeNumberOut{
      font-size: 9pt;
      font-weight: 800;
    }

    #pronounsOut{ font-size: 11pt; }
    #badgeTypeOut{ font-size: 11pt; font-weight: 900; }

    #qrBox{
      position:absolute;
      right: var(--pad);
      bottom: var(--pad);
      width: var(--qr);
      height: var(--qr);
    }

    #qrBox div {
      width: 100% !important;
      height: 100% !important;
    }

    @media print {
      @page { size: 3.5in 1.097in; margin: 0; }
      body * { visibility: hidden; }
      #label, #label * { visibility: visible; }
      #label { position:absolute; top:0; left:0; }
    }
  </style>
</head>

<body>

<h2>Badge Label Generator</h2>

<div class="app">

  <div class="card">
    <label>Badge Name</label>
    <input id="badgeName">

    <label>Badge Number</label>
    <input id="badgeNumber">

    <label>Pronouns</label>
    <select id="pronouns">
      <option value="" selected></option>
      <option>They/Them</option>
      <option>She/Her</option>
      <option>He/Him</option>
    </select>

    <label>Badge Type</label>
    <select id="badgeType">
      <option>Adult</option>
      <option>Youth</option>
      <option>Child</option>
      <option>Staff</option>
    </select>

    <button class="primary" onclick="printLabel()">Print</button>
    <button class="secondary" onclick="clearAll()">Clear</button>
  </div>

  <div class="card">
    <div id="label">
      <div class="textArea">
        <div class="topline">
          <div id="badgeNameOut">Name</div>
          <div id="badgeNumberOut">#0000</div>
        </div>

        <div id="pronounsOut"></div>
        <div id="badgeTypeOut"></div>
      </div>

      <div id="qrBox"></div>
    </div>
  </div>

</div>

<script>
const els = {
  name: document.getElementById("badgeName"),
  number: document.getElementById("badgeNumber"),
  pronouns: document.getElementById("pronouns"),
  type: document.getElementById("badgeType"),
  nameOut: document.getElementById("badgeNameOut"),
  numOut: document.getElementById("badgeNumberOut"),
  pronounsOut: document.getElementById("pronounsOut"),
  typeOut: document.getElementById("badgeTypeOut"),
  qrBox: document.getElementById("qrBox")
};

function render() {
  const name = els.name.value || "Name";
  const num = els.number.value.trim();

  els.nameOut.textContent = name;
  els.numOut.textContent = num ? "#" + num : "#0000";
  els.pronounsOut.textContent = els.pronouns.value;
  els.typeOut.textContent = els.type.value;

  // QR
  els.qrBox.innerHTML = "";
  if (num) {
    new QRCode(els.qrBox, {
      text: num,
      width: 120,
      height: 120
    });
  }
}

function clearAll(){
  els.name.value = "";
  els.number.value = "";
  els.pronouns.selectedIndex = 0;
  render();
}

function printLabel(){
  render();
  window.print();
}

document.querySelectorAll("input, select").forEach(el =>
  el.addEventListener("input", render)
);

render();
</script>

</body>
</html>
